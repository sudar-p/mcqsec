let userAnswers = {};
let revealed = false;
let timerInterval;
let elapsed = 0;
let activeFilter = 0;

function startTimer() {
  timerInterval = setInterval(() => {
    elapsed++;
    const m = String(Math.floor(elapsed/60)).padStart(2,'0');
    const s = String(elapsed%60).padStart(2,'0');
    document.getElementById('timer').textContent = '⏱ '+m+':'+s;
  }, 1000);
}

function getFiltered() {
  if (activeFilter === 0) return QUESTIONS;
  return QUESTIONS.filter(q => q.t === activeFilter);
}

function buildFilters() {
  const row = document.getElementById('filterRow');
  let html = '<button class="topic-btn active" onclick="setFilter(0,this)">All Topics</button>';
  TOPICS.forEach(t => {
    const count = QUESTIONS.filter(q=>q.t===t.id).length;
    html += `<button class="topic-btn" onclick="setFilter(${t.id},this)">T${t.id} (${count})</button>`;
  });
  row.innerHTML = html;
}

function setFilter(tid, el) {
  activeFilter = tid;
  document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderQuestions();
}

function renderQuestions() {
  const qs = getFiltered();
  const container = document.getElementById('qContainer');
  let html = '';
  let curTopic = null;
  qs.forEach((q, localIdx) => {
    const globalIdx = QUESTIONS.indexOf(q);
    if (q.t !== curTopic) {
      curTopic = q.t;
      const tp = TOPICS.find(t=>t.id===q.t);
      html += `<div class="section-header">Topic ${q.t}: ${tp.name} <span>(${qs.filter(x=>x.t===q.t).length} Questions)</span></div>`;
    }
    const ua = userAnswers[globalIdx];
    let cardClass = '';
    if (revealed) {
      if (ua !== undefined) cardClass = ua===q.a ? 'correct-ans' : 'wrong-ans';
    }
    html += `<div class="q-card ${cardClass}" id="card-${globalIdx}">
      <div class="q-num">Q${globalIdx+1}.</div>
      <div class="q-text">${q.q}</div>
      <div class="options">`;
    q.o.forEach((opt, oi) => {
      let cls = '';
      if (ua === oi) cls = 'selected';
      if (revealed) {
        if (oi === q.a) cls = 'correct';
        else if (ua === oi && ua !== q.a) cls = 'wrong';
      }
      html += `<div class="opt ${cls}" onclick="selectAnswer(${globalIdx},${oi})">
        <span class="opt-letter">${String.fromCharCode(65+oi)})</span>
        <span>${opt}</span>
      </div>`;
    });
    html += `</div>`;
    if (revealed) {
      html += `<div class="explanation" id="exp-${globalIdx}" style="display:block">✔ Correct answer: <strong>${String.fromCharCode(65+q.a)}) ${q.o[q.a]}</strong></div>`;
    }
    html += `</div>`;
  });
  container.innerHTML = html;
  updateProgress();
}

function selectAnswer(idx, optIdx) {
  if (revealed) return;
  userAnswers[idx] = optIdx;
  const card = document.getElementById('card-'+idx);
  card.querySelectorAll('.opt').forEach((el,i)=>{
    el.classList.toggle('selected', i===optIdx);
  });
  updateProgress();
}

function updateProgress() {
  const total = QUESTIONS.length;
  const answered = Object.keys(userAnswers).length;
  document.getElementById('progress').textContent = `Answered: ${answered} / ${total}`;
}

function revealAll() {
  revealed = true;
  renderQuestions();
  calcScore(true);
}

function calcScore(show) {
  let correct = 0, wrong = 0, skipped = 0;
  QUESTIONS.forEach((q,i)=>{
    if (userAnswers[i]===undefined) skipped++;
    else if (userAnswers[i]===q.a) correct++;
    else wrong++;
  });
  const pct = Math.round((correct/QUESTIONS.length)*100);
  if (show) {
    document.getElementById('scoreBox').style.display='block';
    document.getElementById('scoreBox').textContent=`Score: ${correct} / ${QUESTIONS.length}`;
    const sum = document.getElementById('summary');
    sum.style.display='block';
    document.getElementById('sumPct').textContent=pct+'%';
    let grade = pct>=90?'Excellent! Outstanding performance.':pct>=75?'Very Good! Keep it up.':pct>=60?'Good. Review weak areas.':pct>=40?'Average. More practice needed.':'Needs Improvement. Revise all topics.';
    document.getElementById('sumGrade').textContent=grade;
    document.getElementById('sumC').textContent=`✔ Correct: ${correct}`;
    document.getElementById('sumW').textContent=`✘ Wrong: ${wrong}`;
    document.getElementById('sumS').textContent=`– Skipped: ${skipped}`;
    sum.scrollIntoView({behavior:'smooth'});
    clearInterval(timerInterval);
  }
}

function submitExam() {
  const answered = Object.keys(userAnswers).length;
  if (answered < QUESTIONS.length) {
    if (!confirm(`You have answered ${answered} of ${QUESTIONS.length} questions. Submit anyway?`)) return;
  }
  revealAll();
}

function resetAll() {
  if (!confirm('Reset all answers? This cannot be undone.')) return;
  userAnswers = {};
  revealed = false;
  elapsed = 0;
  clearInterval(timerInterval);
  startTimer();
  document.getElementById('scoreBox').style.display='none';
  document.getElementById('summary').style.display='none';
  activeFilter = 0;
  document.querySelectorAll('.topic-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  renderQuestions();
}

function toggleAll() {
  activeFilter = 0;
  document.querySelectorAll('.topic-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  renderQuestions();
}

window.addEventListener('scroll', () => {
  document.getElementById('topBtn').style.display = window.scrollY > 300 ? 'block' : 'none';
});

buildFilters();
renderQuestions();
startTimer();
</script>
